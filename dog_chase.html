<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dog Chase!</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #111;
    color: #eee;
    font-family: system-ui, sans-serif;
    overflow: hidden;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
  }
  canvas {
    background: linear-gradient(#87ceeb 0%, #87ceeb 60%, #6bbf59 60%, #4e9c3f 100%);
    border: 4px solid #333;
    border-radius: 8px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.5);
    display: block;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    width: 800px;
    padding: 8px 4px;
    font-size: 18px;
    letter-spacing: 0.5px;
  }
  #overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(0,0,0,0.7);
    z-index: 10;
  }
  #overlay h1 { font-size: 56px; margin: 0 0 12px; }
  #overlay p  { font-size: 20px; margin: 4px 0; }
  #overlay button {
    margin-top: 18px;
    padding: 10px 22px;
    font-size: 18px;
    background: #ffcc33;
    color: #222;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
  }
  #overlay button:hover { background: #ffd95c; }
  .tag { color: #ffcc33; font-weight: bold; }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div>Time: <span id="time" class="tag">0.0</span>s</div>
    <div>Best: <span id="best" class="tag">0.0</span>s</div>
    <div>Dogs: <span id="dogs" class="tag">1</span></div>
  </div>
  <canvas id="game" width="800" height="500"></canvas>
  <div id="hud" style="font-size:14px;opacity:0.7;">
    <div>Arrow keys or WASD to move. Don't let the dogs catch you!</div>
  </div>
</div>

<div id="overlay">
  <h1 id="overTitle">Caught!</h1>
  <p>You survived <span id="overTime" class="tag">0.0</span> seconds.</p>
  <p id="overBest"></p>
  <button id="restart">Play Again</button>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  const timeEl = document.getElementById('time');
  const bestEl = document.getElementById('best');
  const dogsEl = document.getElementById('dogs');
  const overlay = document.getElementById('overlay');
  const overTime = document.getElementById('overTime');
  const overBest = document.getElementById('overBest');
  const restartBtn = document.getElementById('restart');

  let best = parseFloat(localStorage.getItem('dogChaseBest') || '0');
  bestEl.textContent = best.toFixed(1);

  const keys = Object.create(null);
  window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) {
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  const boy = {
    x: W / 2,
    y: H * 0.75,
    r: 14,
    speed: 240, // px/sec
    facing: 1,  // 1 = right, -1 = left
    stepPhase: 0,
  };

  let dogs = [];
  let elapsed = 0;
  let running = true;
  let spawnTimer = 0;
  let lastTs = 0;

  function spawnDog() {
    // Spawn off-screen edge
    const side = Math.floor(Math.random() * 4);
    let x, y;
    if (side === 0) { x = -30; y = Math.random() * H; }
    else if (side === 1) { x = W + 30; y = Math.random() * H; }
    else if (side === 2) { x = Math.random() * W; y = -30; }
    else { x = Math.random() * W; y = H + 30; }
    dogs.push({
      x, y,
      r: 16,
      speed: 140 + Math.random() * 40,
      stepPhase: Math.random() * Math.PI * 2,
    });
  }

  function reset() {
    boy.x = W / 2;
    boy.y = H * 0.75;
    boy.facing = 1;
    dogs = [];
    spawnDog();
    elapsed = 0;
    spawnTimer = 0;
    running = true;
    overlay.style.display = 'none';
    lastTs = performance.now();
    requestAnimationFrame(loop);
  }

  function gameOver() {
    running = false;
    overTime.textContent = elapsed.toFixed(1);
    if (elapsed > best) {
      best = elapsed;
      localStorage.setItem('dogChaseBest', String(best));
      bestEl.textContent = best.toFixed(1);
      overBest.innerHTML = '<span class="tag">New best!</span>';
    } else {
      overBest.textContent = 'Best: ' + best.toFixed(1) + 's';
    }
    overlay.style.display = 'flex';
  }

  restartBtn.addEventListener('click', reset);
  window.addEventListener('keydown', e => {
    if (!running && (e.key === 'Enter' || e.key === ' ')) reset();
  });

  function update(dt) {
    // Input
    let dx = 0, dy = 0;
    if (keys['arrowleft']  || keys['a']) dx -= 1;
    if (keys['arrowright'] || keys['d']) dx += 1;
    if (keys['arrowup']    || keys['w']) dy -= 1;
    if (keys['arrowdown']  || keys['s']) dy += 1;
    const len = Math.hypot(dx, dy);
    if (len > 0) {
      dx /= len; dy /= len;
      boy.x += dx * boy.speed * dt;
      boy.y += dy * boy.speed * dt;
      if (dx !== 0) boy.facing = dx > 0 ? 1 : -1;
      boy.stepPhase += dt * 12;
    }
    // Keep in bounds
    boy.x = Math.max(boy.r, Math.min(W - boy.r, boy.x));
    boy.y = Math.max(boy.r, Math.min(H - boy.r, boy.y));

    // Dogs chase
    for (const dog of dogs) {
      const vx = boy.x - dog.x;
      const vy = boy.y - dog.y;
      const d = Math.hypot(vx, vy) || 1;
      dog.x += (vx / d) * dog.speed * dt;
      dog.y += (vy / d) * dog.speed * dt;
      dog.stepPhase += dt * 14;
      // Collision
      const hit = Math.hypot(boy.x - dog.x, boy.y - dog.y) < boy.r + dog.r - 4;
      if (hit) { gameOver(); return; }
    }

    // Difficulty: add a new dog every 10 seconds, and speed up existing dogs slightly
    spawnTimer += dt;
    if (spawnTimer >= 10) {
      spawnTimer = 0;
      spawnDog();
      for (const dog of dogs) dog.speed += 4;
    }

    elapsed += dt;
    timeEl.textContent = elapsed.toFixed(1);
    dogsEl.textContent = String(dogs.length);
  }

  // --- Drawing helpers ---
  function drawShadow(x, y, r) {
    ctx.beginPath();
    ctx.ellipse(x, y + r + 2, r * 0.9, r * 0.35, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fill();
  }

  function drawBoy(b) {
    drawShadow(b.x, b.y + 6, b.r);
    const bob = Math.sin(b.stepPhase) * 2;
    const legSwing = Math.sin(b.stepPhase) * 6;
    const cx = b.x;
    const cy = b.y + bob;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(b.facing, 1);

    // Legs
    ctx.strokeStyle = '#2a2a6a';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-4, 6);
    ctx.lineTo(-4 + legSwing * 0.4, 18);
    ctx.moveTo(4, 6);
    ctx.lineTo(4 - legSwing * 0.4, 18);
    ctx.stroke();

    // Body (shirt)
    ctx.fillStyle = '#e63946';
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(-8, -6, 16, 16, 4) : ctx.rect(-8, -6, 16, 16);
    ctx.fill();

    // Arms
    ctx.strokeStyle = '#f2c29b';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(-8, -2);
    ctx.lineTo(-10 - legSwing * 0.3, 6);
    ctx.moveTo(8, -2);
    ctx.lineTo(10 + legSwing * 0.3, 6);
    ctx.stroke();

    // Head
    ctx.fillStyle = '#f2c29b';
    ctx.beginPath();
    ctx.arc(0, -14, 8, 0, Math.PI * 2);
    ctx.fill();

    // Hair
    ctx.fillStyle = '#3b2a1a';
    ctx.beginPath();
    ctx.arc(0, -16, 8, Math.PI, 0);
    ctx.fill();

    // Eye
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(3, -14, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Mouth (scared)
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(2, -10, 2, 0, Math.PI);
    ctx.stroke();

    ctx.restore();
  }

  function drawDog(d, boyRef) {
    drawShadow(d.x, d.y + 4, d.r);
    const facing = (boyRef.x >= d.x) ? 1 : -1;
    const bob = Math.sin(d.stepPhase) * 1.5;
    const legSwing = Math.sin(d.stepPhase) * 5;

    ctx.save();
    ctx.translate(d.x, d.y + bob);
    ctx.scale(facing, 1);

    // Legs
    ctx.strokeStyle = '#4b2e1f';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-10, 6); ctx.lineTo(-10 + legSwing * 0.5, 16);
    ctx.moveTo(-4, 6);  ctx.lineTo(-4 - legSwing * 0.5, 16);
    ctx.moveTo(4, 6);   ctx.lineTo(4 + legSwing * 0.5, 16);
    ctx.moveTo(10, 6);  ctx.lineTo(10 - legSwing * 0.5, 16);
    ctx.stroke();

    // Body
    ctx.fillStyle = '#8b5a2b';
    ctx.beginPath();
    ctx.ellipse(0, 2, 14, 9, 0, 0, Math.PI * 2);
    ctx.fill();

    // Tail
    ctx.strokeStyle = '#8b5a2b';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-12, -2);
    ctx.quadraticCurveTo(-20, -8 + Math.sin(d.stepPhase) * 3, -22, -2);
    ctx.stroke();

    // Head
    ctx.fillStyle = '#a0693a';
    ctx.beginPath();
    ctx.ellipse(13, -4, 9, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Ear (floppy)
    ctx.fillStyle = '#5a3a1f';
    ctx.beginPath();
    ctx.ellipse(10, -9, 3, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Snout
    ctx.fillStyle = '#6b3f22';
    ctx.beginPath();
    ctx.ellipse(20, -2, 4, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Nose
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(23, -3, 1.4, 0, Math.PI * 2);
    ctx.fill();

    // Eye (angry)
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(14, -6, 1.3, 0, Math.PI * 2);
    ctx.fill();

    // Teeth hint
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(18, 0); ctx.lineTo(20, 1.5);
    ctx.stroke();

    ctx.restore();
  }

  function drawGrassTufts() {
    // Fixed pseudo-random tufts on the ground
    ctx.fillStyle = '#3e7d32';
    const seeds = [
      [60, 360],[140, 420],[230, 380],[320, 450],[410, 390],
      [500, 440],[590, 380],[680, 430],[760, 395],[95, 470],
      [280, 470],[470, 475],[650, 465]
    ];
    for (const [x, y] of seeds) {
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + 3, y - 8);
      ctx.lineTo(x + 6, y);
      ctx.closePath();
      ctx.fill();
    }
  }

  function drawClouds() {
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    const cx = (performance.now() * 0.01) % (W + 200) - 100;
    for (const [ox, oy, s] of [[0,60,1],[220,100,0.7],[460,50,1.1],[640,90,0.8]]) {
      const x = (cx + ox) % (W + 200) - 100;
      ctx.beginPath();
      ctx.arc(x, oy, 18*s, 0, Math.PI*2);
      ctx.arc(x + 18*s, oy - 6*s, 14*s, 0, Math.PI*2);
      ctx.arc(x + 34*s, oy, 18*s, 0, Math.PI*2);
      ctx.arc(x + 18*s, oy + 6*s, 14*s, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function render() {
    // Sky + ground already set by CSS gradient; re-draw for animation layers
    ctx.clearRect(0, 0, W, H);
    // Sky
    const sky = ctx.createLinearGradient(0, 0, 0, H * 0.6);
    sky.addColorStop(0, '#87ceeb');
    sky.addColorStop(1, '#bfe5f0');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H * 0.6);
    // Ground
    const gr = ctx.createLinearGradient(0, H * 0.6, 0, H);
    gr.addColorStop(0, '#6bbf59');
    gr.addColorStop(1, '#3f7a33');
    ctx.fillStyle = gr;
    ctx.fillRect(0, H * 0.6, W, H * 0.4);

    drawClouds();
    drawGrassTufts();

    // Draw entities sorted by y so closer ones render on top
    const all = [{type:'boy', y: boy.y, ref: boy}, ...dogs.map(d => ({type:'dog', y: d.y, ref: d}))];
    all.sort((a, b) => a.y - b.y);
    for (const e of all) {
      if (e.type === 'boy') drawBoy(e.ref);
      else drawDog(e.ref, boy);
    }
  }

  function loop(ts) {
    if (!running) return;
    const dt = Math.min(0.033, (ts - lastTs) / 1000);
    lastTs = ts;
    update(dt);
    if (!running) { render(); return; }
    render();
    requestAnimationFrame(loop);
  }

  reset();
})();
</script>
</body>
</html>
